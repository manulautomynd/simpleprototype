<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USA Territory Map</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        #sidebar {
            width: 300px;
            background: #2c3e50;
            color: white;
            padding: 20px;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
            z-index: 1000;
            display: flex;
            flex-direction: column;
        }
        #map {
            flex-grow: 1;
            height: 100%;
        }
        h2 {
            margin-top: 0;
            border-bottom: 2px solid #34495e;
            padding-bottom: 10px;
        }
        .territory-info {
            background: #34495e;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
        }
        .zip-list {
            max-height: 400px;
            overflow-y: auto;
            margin-top: 10px;
            padding-left: 0;
            list-style: none;
        }
        .zip-list li {
            padding: 5px 10px;
            border-bottom: 1px solid #2c3e50;
            font-size: 0.9em;
        }
        .legend {
            background: white;
            padding: 10px;
            border-radius: 5px;
            color: #333;
            line-height: 1.5;
        }
        .legend i {
            width: 18px;
            height: 18px;
            float: left;
            margin-right: 8px;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div id="sidebar">
        <h2>Territory Manager</h2>
        <p>Click on a territory to see details.</p>
        
        <div id="info-panel" class="territory-info" style="display:none;">
            <h3 id="territory-name">Territory Name</h3>
            <p><strong>Color:</strong> <span id="territory-color-label"></span></p>
            <p><strong>Available Zip Codes:</strong></p>
            <ul id="zip-codes" class="zip-list">
                <!-- Zip codes will be listed here -->
            </ul>
        </div>
    </div>
    <div id="map"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="territory.js"></script>
</body>
</html>
