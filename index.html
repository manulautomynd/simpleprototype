<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practitioner Territory Map</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            background: #1a252f;
        }

        /* ── Sidebar ── */
        #sidebar {
            width: 340px;
            min-width: 340px;
            background: #2c3e50;
            color: white;
            padding: 20px;
            box-shadow: 2px 0 8px rgba(0,0,0,.25);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        #sidebar h2 {
            margin: 0 0 4px;
            font-size: 1.3rem;
            border-bottom: 2px solid #34495e;
            padding-bottom: 10px;
        }
        #sidebar .subtitle {
            color: #95a5a6;
            font-size: .85rem;
            margin: 0 0 18px;
        }

        /* ── Dropdown ── */
        .dropdown-wrap {
            position: relative;
            margin-bottom: 16px;
        }
        .dropdown-wrap label {
            display: block;
            font-size: .8rem;
            text-transform: uppercase;
            letter-spacing: .5px;
            color: #95a5a6;
            margin-bottom: 6px;
        }
        #practitioner-select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #4a6278;
            border-radius: 6px;
            background: #34495e;
            color: #ecf0f1;
            font-size: .95rem;
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
            background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l5 5 5-5' stroke='%2395a5a6' stroke-width='2' fill='none'/%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 12px center;
        }
        #practitioner-select:focus {
            outline: none;
            border-color: #2ecc71;
        }

        /* ── Practitioner Card ── */
        #practitioner-card {
            background: #34495e;
            border-radius: 10px;
            padding: 18px;
            margin-top: 4px;
            display: none;
            animation: slideIn .25s ease;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-8px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        #practitioner-card .card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
        }
        #practitioner-card .avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #2ecc71;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.1rem;
            color: #fff;
            flex-shrink: 0;
        }
        #practitioner-card .card-header h3 {
            margin: 0;
            font-size: 1rem;
            line-height: 1.2;
        }
        #practitioner-card .badge {
            display: inline-block;
            background: rgba(46,204,113,.15);
            color: #2ecc71;
            font-size: .75rem;
            padding: 2px 8px;
            border-radius: 20px;
            font-weight: 600;
        }
        #practitioner-card .detail-row {
            display: flex;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,.06);
            font-size: .88rem;
        }
        #practitioner-card .detail-row:last-child { border-bottom: none; }
        #practitioner-card .detail-label {
            color: #95a5a6;
            width: 80px;
            flex-shrink: 0;
        }
        #practitioner-card .detail-value {
            color: #ecf0f1;
        }

        /* ── Territory Info (shown on state click) ── */
        #info-panel {
            background: #34495e;
            padding: 16px;
            border-radius: 8px;
            margin-top: 14px;
            display: none;
            animation: slideIn .25s ease;
        }
        #info-panel h3 {
            margin: 0 0 2px;
            font-size: 1.05rem;
        }
        #info-panel .region-label {
            font-size: .8rem;
            font-weight: 600;
            margin-bottom: 10px;
            display: block;
        }
        #info-panel .zip-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 6px;
        }
        #info-panel .zip-header span {
            font-size: .85rem;
            color: #bdc3c7;
        }
        #info-panel .zip-badge {
            background: rgba(46,204,113,.15);
            color: #2ecc71;
            font-size: .75rem;
            padding: 2px 8px;
            border-radius: 20px;
            font-weight: 600;
        }
        .zip-list {
            max-height: 180px;
            overflow-y: auto;
            margin: 0;
            padding-left: 0;
            list-style: none;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .zip-list li {
            background: #2c3e50;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: .82em;
            color: #ecf0f1;
        }

        /* ── Practitioner count badge ── */
        .practitioner-count {
            margin-top: auto;
            padding-top: 14px;
            border-top: 1px solid #34495e;
            font-size: .85rem;
            color: #95a5a6;
        }
        .practitioner-count strong { color: #2ecc71; }

        /* ── Map ── */
        #map {
            flex-grow: 1;
            height: 100%;
        }

        /* ── Legend ── */
        .legend {
            background: white;
            padding: 10px 14px;
            border-radius: 6px;
            color: #333;
            line-height: 1.6;
            font-size: .85rem;
            box-shadow: 0 2px 6px rgba(0,0,0,.2);
        }
        .legend i {
            width: 14px;
            height: 14px;
            float: left;
            margin-right: 8px;
            border-radius: 50%;
        }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            #sidebar {
                width: 100%;
                min-width: unset;
                height: auto;
                max-height: 40vh;
                padding: 14px;
            }
            #map { height: 60vh; }
        }
    </style>
</head>
<body>
    <div id="sidebar">
        <h2>Practitioner Map</h2>
        <p class="subtitle">View and track practitioners across territories</p>

        <!-- Practitioner dropdown -->
        <div class="dropdown-wrap">
            <label for="practitioner-select">Select Practitioner</label>
            <select id="practitioner-select">
                <option value="">— All Practitioners —</option>
            </select>
        </div>

        <!-- Practitioner detail card -->
        <div id="practitioner-card">
            <div class="card-header">
                <div class="avatar" id="card-avatar">SM</div>
                <div>
                    <h3 id="card-name">Dr. Name</h3>
                    <span class="badge" id="card-status">Active</span>
                </div>
            </div>
            <div class="detail-row"><span class="detail-label">Specialty</span><span class="detail-value" id="card-specialty"></span></div>
            <div class="detail-row"><span class="detail-label">Phone</span><span class="detail-value" id="card-phone"></span></div>
            <div class="detail-row"><span class="detail-label">Email</span><span class="detail-value" id="card-email"></span></div>
            <div class="detail-row"><span class="detail-label">Address</span><span class="detail-value" id="card-address"></span></div>
            <div class="detail-row"><span class="detail-label">Territory</span><span class="detail-value" id="card-territory"></span></div>
        </div>

        <!-- Territory info (state click) -->
        <div id="info-panel" class="territory-info">
            <h3 id="territory-name">Territory Name</h3>
            <span class="region-label" id="territory-region-label"></span>
            <div class="zip-header">
                <span>Zip Codes</span>
                <span class="zip-badge" id="zip-count">0</span>
            </div>
            <ul id="zip-codes" class="zip-list"></ul>
            <p style="display:none"><strong>Color:</strong> <span id="territory-color-label"></span></p>
        </div>

        <div class="practitioner-count">
            <strong id="total-count">0</strong> practitioners loaded
        </div>
    </div>

    <div id="map"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="territory.js"></script>
</body>
</html>
